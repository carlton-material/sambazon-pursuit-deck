  <div class="gate" id="gate">
    <h1>Material<span class="accent">+</span> &times; Sambazon</h1>
    <p>This pursuit deck is confidential. Enter the access code to continue.</p>
    <div>
      <input type="password" id="pw" placeholder="Access code" autofocus />
      <button onclick="checkPw()">Enter</button>
    </div>
    <div class="error" id="err">Incorrect code. Please try again.</div>
  </div>
  <script>
    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash |= 0;
      }
      return hash;
    }
    const EXPECTED = simpleHash("Material2026");
    function checkPw() {
      const val = document.getElementById("pw").value;
      if (simpleHash(val) === EXPECTED) {
        document.getElementById("gate").style.display = "none";
        const decoded = atob(ENCODED_PAGE);
        document.open();
        document.write(decoded);
        document.close();
      } else {
        document.getElementById("err").style.display = "block";
        document.getElementById("pw").value = "";
        document.getElementById("pw").focus();
      }
    }
    document.getElementById("pw").addEventListener("keydown", function(e) {
      if (e.key === "Enter") checkPw();
    });
  </script>
